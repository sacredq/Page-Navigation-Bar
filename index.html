<!DOCTYPE html>
<html>
    <head>
        <title>Page navigation bar</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
        <meta name = "viewport" content = "width=device-width, initial-scale = 1.0">
        <meta charset = "UTF-8">
    </head>
    <body>
        <div class = "navBar">
            <div class = "icon-box">
                <i id = "arrow-left-2" class="fa-solid fa-angles-left"></i>
            </div>

            <div class = "icon-box">
                <i id = "arrow-left" class="fa-solid fa-arrow-left"></i>
            </div>

            <div class = "icon-box icon">
                <p id = "page-1">1</p>
            </div>

            <div class = "icon-box icon">
                <p id = "page-2">2</p>
            </div>

            <div class = "icon-box icon">
                <p id = "page-3">3</p>
            </div>

            <div class = "icon-box icon">
                <p id = "page-4">4</p>
            </div>

            <div class = "icon-box icon">
                <p id = "page-5">5</p>
            </div>

            <div class = "icon-box">
                <i id = "arrow-right" class="fa-solid fa-arrow-right"></i>
            </div>

            <div class = "icon-box">
                <i id = "arrow-right-2" class = "fa-solid fa-angles-right"></i>
            </div>
        </div>
        <script src = "main.js"></script>
    </body>
</html>
